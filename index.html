<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Nikshya</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: "Great Vibes", cursive;
      }

      .video-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      .name-overlay {
        position: relative;
        z-index: 2;
        font-size: clamp(4rem, 15vw, 10rem);
        color: rgba(255, 255, 255, 0.9);
        mix-blend-mode: overlay;
        text-shadow: 2px 2px 20px rgba(255, 255, 255, 0.6);
        pointer-events: none;
        margin: 0;
        animation: pulseText 4s ease-in-out infinite, floatText 6s ease-in-out infinite;
      }

      @keyframes pulseText {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }

      @keyframes floatText {
        0%,
        100% {
          transform: translateY(0px) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.05);
        }
      }

      .play-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.8);
        font-size: 2rem;
        cursor: pointer;
        transition: opacity 0.5s ease;
        font-family: system-ui, -apple-system, sans-serif;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Overlay to capture click for autoplay policy with audio -->
    <div class="play-overlay" id="playOverlay">
      Tap to Start
    </div>

    <div class="video-container">
      <video id="bgVideo" loop playsinline>
        <source src="video.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <h1 class="name-overlay">Nikshya</h1>
    </div>

    <script>
      const video = document.getElementById("bgVideo");
      const playOverlay = document.getElementById("playOverlay");

      // Wait for user interaction to play video with audio
      document.body.addEventListener("click", () => {
        if (video.paused) {
          video.play().then(() => {
            playOverlay.classList.add("hidden");
          }).catch(err => {
            console.error("Error playing video:", err);
          });
        }
      });
    </script>
  </body>
</html>
